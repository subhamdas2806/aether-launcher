name: Build and Release Aether

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore Dependencies
      run: dotnet restore GameShelf.csproj

    - name: Publish App
      run: dotnet publish GameShelf.csproj -c Release -r win-x64 --self-contained true -p:WindowsPackageType=None

    - name: Compile Installer using Inno Setup
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

    - name: Upload Portable App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Aether-Portable-win-x64
        path: bin/Release/net8.0-windows10.0.26100.0/win-x64/publish/

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AetherSetup
        path: setup/AetherSetup.exe

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v1.0.{0}', github.run_number) }}
        name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('Aether v1.0.{0}', github.run_number) }}
        prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        files: |
          setup/AetherSetup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
